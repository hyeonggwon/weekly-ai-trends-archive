<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weekly AI Trends · 아카이브</title>
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #131316;
    --bg-card: #161619;
    --fg: #f4f4f5;
    --fg-dim: #a1a1aa;
    --fg-muted: #71717a;
    --accent: #d97757;
    --accent-soft: rgba(217, 119, 87, 0.12);
    --border: #27272a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo",
                 "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 80px 24px 120px 24px;
  }
  header {
    padding-bottom: 48px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }
  .eyebrow {
    font-size: 12px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 20px;
  }
  h1 {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin: 0 0 16px 0;
  }
  .tagline {
    font-size: clamp(16px, 1.6vw, 20px);
    color: var(--fg-dim);
    line-height: 1.5;
    max-width: 680px;
    margin: 0;
  }
  .counter {
    margin-top: 24px;
    font-size: 13px;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 24px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color 0.15s, transform 0.15s, background 0.15s;
    position: relative;
    min-height: 220px;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    background: #1a1a1e;
  }
  .card-date {
    font-size: 12px;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .card-title {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.015em;
    color: var(--fg);
    margin: 0;
  }
  .card-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: auto;
  }
  .kw {
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .card-arrow {
    position: absolute;
    bottom: 20px;
    right: 24px;
    font-size: 18px;
    color: var(--fg-muted);
    transition: color 0.15s, transform 0.15s;
  }
  .card:hover .card-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }
  .empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--fg-muted);
    font-size: 16px;
  }
  .error {
    text-align: center;
    padding: 80px 24px;
    color: var(--fg-muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .error code {
    background: var(--bg-elev);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--fg-dim);
  }
  footer {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--fg-muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  @media (max-width: 640px) {
    .wrap { padding: 48px 18px 80px 18px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Weekly AI Trends · Archive</div>
    <h1>이번 주 AI, 한 장으로</h1>
    <p class="tagline">Claude Code와 Anthropic 생태계를 중심으로 한 주간 AI 트렌드 아카이브입니다. 매주 월요일 갱신.</p>
    <div class="counter" id="counter">불러오는 중…</div>
  </header>
  <main id="main">
    <div class="empty">불러오는 중…</div>
  </main>
  <footer>
    <div>Weekly AI Trends</div>
    <div>Auto-generated · Static site</div>
  </footer>
</div>
<script>
(async function () {
  const main = document.getElementById('main');
  const counter = document.getElementById('counter');

  function escape(s) {
    return String(s ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function renderCards(items) {
    if (!items.length) {
      main.innerHTML = '<div class="empty">아직 쌓인 브리프가 없습니다. 첫 주가 기다려집니다.</div>';
      counter.textContent = '총 0개 브리프';
      return;
    }
    const cards = items.map(m => {
      const date = escape(m.date || '');
      const title = escape(m.title || '이번 주 AI 트렌드');
      const subtitle = escape(m.subtitle || '');
      const href = escape(m.html_filename || `${date}.html`);
      const kws = (m.keywords || []).slice(0, 3)
        .map(k => `<span class="kw">${escape(k)}</span>`)
        .join('');
      const topLine = subtitle || date;
      return `
        <a class="card" href="${href}">
          <div class="card-date">${escape(topLine)}</div>
          <h2 class="card-title">${title}</h2>
          <div class="card-keywords">${kws}</div>
          <div class="card-arrow">→</div>
        </a>`;
    }).join('');
    main.innerHTML = `<div class="grid">${cards}</div>`;
    counter.textContent = `총 ${items.length}개 브리프 · 마지막 업데이트 ${escape(items[0].date || '—')}`;
  }

  try {
    // Cache-bust: append a timestamp so Vercel's CDN doesn't serve stale briefs.json
    const res = await fetch('briefs.json?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('briefs.json is not an array');
    // Always sort by date desc — defensive, even though update_archive.py also sorts.
    data.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    renderCards(data);
  } catch (err) {
    main.innerHTML = `
      <div class="error">
        <p>briefs.json을 불러오지 못했습니다.</p>
        <p><code>${escape(err.message)}</code></p>
        <p>아카이브가 처음 배포되는 중이거나, 매니페스트 파일이 누락됐을 수 있습니다.</p>
      </div>`;
    counter.textContent = '—';
  }
})();
</script>
</body>
</html>
